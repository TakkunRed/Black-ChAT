<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpus2Skill — RAG 検索テスト</title>
    <!-- テーマ FOUC 防止 -->
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);if(t==='light')document.documentElement.style.colorScheme='light';})();</script>
    <style>
        /* ── テーマ変数 ── */
        :root {
            --p-bg:          #0d0d14;
            --p-surface:     #10101a;
            --p-card:        #13131f;
            --p-deep:        #0b0b14;
            --p-input:       #1a1a2a;
            --p-border:      #1e1e2e;
            --p-border2:     #1a1a2a;
            --p-border3:     #2a2a3e;
            --p-border4:     #141420;
            --p-border5:     #222;
            --p-border6:     #2a2a40;
            --p-text:        #cccccc;
            --p-text-h:      #e2e2ff;
            --p-text-m:      #555555;
            --p-text-d:      #777777;
            --p-text-dim:    #444444;
            --p-text-btn:    #aaaaaa;
            --p-text-ph:     #333333;
            --p-text-input:  #dddddd;
            --p-hover:       #14141e;
            --p-selected:    #1a1a30;
            --p-badge:       #1e1e40;
            --p-accent:      #6366f1;
            --p-accent2:     #818cf8;
            --p-btn-bg:      #1e1e2e;
            --p-btn-border:  #333333;
            --p-btn-hover:   #2a2a3e;
            --p-score-bar:   #1a1a2a;
            --p-scroll:      #2a2a3e;
            --p-scroll2:     #3a3a5e;
            --p-spin:        #222222;
        }
        html[data-theme="light"], body.light-theme {
            --p-bg:          #f0f2f8;
            --p-surface:     #e8eaf0;
            --p-card:        #ffffff;
            --p-deep:        #f5f6ff;
            --p-input:       #ffffff;
            --p-border:      #d8dae8;
            --p-border2:     #e0e2f0;
            --p-border3:     #c8cadc;
            --p-border4:     #e4e6f0;
            --p-border5:     #d0d2e0;
            --p-border6:     #c8cadc;
            --p-text:        #1a1a30;
            --p-text-h:      #1a1a30;
            --p-text-m:      #5a5a78;
            --p-text-d:      #6a6a88;
            --p-text-dim:    #8888a8;
            --p-text-btn:    #5a5a78;
            --p-text-ph:     #aaaacc;
            --p-text-input:  #1a1a30;
            --p-hover:       #eceef8;
            --p-selected:    #dde0f0;
            --p-badge:       #e8e8ff;
            --p-accent:      #4f46e5;
            --p-accent2:     #6366f1;
            --p-btn-bg:      #ffffff;
            --p-btn-border:  #c0c2d8;
            --p-btn-hover:   #eceef8;
            --p-score-bar:   #e0e2f0;
            --p-scroll:      #c0c2d8;
            --p-scroll2:     #9a9cc0;
            --p-spin:        #e0e2f0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--p-bg);
            color: var(--p-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── ヘッダー ── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: var(--p-card);
            border-bottom: 1px solid var(--p-border5);
            flex-shrink: 0;
        }
        header h1 { font-size: 16px; font-weight: 600; color: var(--p-text-h); flex: 1; }
        .btn-back {
            background: var(--p-btn-bg);
            border: 1px solid var(--p-btn-border);
            color: var(--p-text-btn);
            padding: 5px 12px; border-radius: 6px; cursor: pointer;
            font-size: 12px; text-decoration: none; transition: background .15s;
        }
        .btn-back:hover { background: var(--p-btn-hover); color: var(--p-text-h); }
        .btn-theme {
            background: var(--p-btn-bg);
            border: 1px solid var(--p-btn-border);
            color: var(--p-text-btn);
            padding: 5px 10px; border-radius: 6px; cursor: pointer;
            font-size: 14px; line-height: 1; transition: background .15s;
        }
        .btn-theme:hover { background: var(--p-btn-hover); }

        /* ── 検索バー ── */
        .search-bar {
            padding: 14px 20px;
            background: var(--p-surface);
            border-bottom: 1px solid var(--p-border2);
            flex-shrink: 0;
        }
        .search-row { display: flex; gap: 10px; align-items: center; }
        .search-input {
            flex: 1;
            background: var(--p-input);
            border: 1px solid var(--p-border3);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--p-text-input);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }
        .search-input:focus { border-color: var(--p-accent); }
        .search-input::placeholder { color: var(--p-text-m); }
        .search-btn {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 10px 22px;
            font-size: 14px;
            cursor: pointer;
            transition: background .15s;
            white-space: nowrap;
        }
        .search-btn:hover { background: #6366f1; }
        .search-btn:disabled { background: var(--p-border3); color: var(--p-text-m); cursor: not-allowed; }
        .search-meta {
            margin-top: 8px;
            font-size: 12px;
            color: var(--p-text-m);
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .top-k-label { color: var(--p-text-m); }
        .top-k-select {
            background: var(--p-input);
            border: 1px solid var(--p-border3);
            border-radius: 4px;
            color: var(--p-text-btn);
            padding: 2px 8px;
            font-size: 12px;
            outline: none;
        }

        /* ── メインレイアウト ── */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ── 結果リスト ── */
        .results-panel {
            width: 380px;
            min-width: 280px;
            background: var(--p-surface);
            border-right: 1px solid var(--p-border);
            overflow-y: auto;
            flex-shrink: 0;
            padding: 12px 0;
        }
        .results-empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--p-text-dim);
            font-size: 13px;
        }
        .results-empty .icon { font-size: 32px; margin-bottom: 10px; }

        .result-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--p-border4);
            cursor: pointer;
            transition: background .12s;
        }
        .result-item:hover { background: var(--p-hover); }
        .result-item.selected { background: var(--p-selected); border-left: 3px solid var(--p-accent); padding-left: 13px; }

        .result-rank {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .result-rank-num {
            font-size: 10px;
            background: var(--p-badge);
            color: var(--p-accent);
            border-radius: 10px;
            padding: 1px 8px;
        }
        .result-score { font-size: 11px; color: var(--p-text-m); }
        .score-bar {
            height: 3px;
            background: var(--p-score-bar);
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            border-radius: 2px;
            transition: width .3s;
        }
        .result-doc {
            font-size: 10px;
            color: var(--p-accent);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-preview {
            font-size: 12px;
            color: var(--p-text-d);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── 詳細パネル ── */
        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            background: var(--p-bg);
        }
        .detail-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: var(--p-text-ph);
        }
        .detail-placeholder .icon { font-size: 48px; }

        .detail-section {
            background: var(--p-card);
            border: 1px solid var(--p-border);
            border-radius: 10px;
            padding: 20px 22px;
            margin-bottom: 16px;
        }
        .detail-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--p-accent);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 12px;
        }
        .detail-meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .detail-tag {
            font-size: 11px;
            background: var(--p-input);
            border: 1px solid var(--p-border6);
            border-radius: 4px;
            padding: 3px 10px;
            color: var(--p-accent2);
        }
        .detail-score-large {
            font-size: 28px;
            font-weight: 700;
            color: var(--p-accent);
            margin-bottom: 4px;
        }
        .detail-score-label { font-size: 12px; color: var(--p-text-m); }

        .chunk-text-box {
            background: var(--p-deep);
            border: 1px solid var(--p-border2);
            border-radius: 8px;
            padding: 18px 20px;
            font-size: 13px;
            color: var(--p-text);
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── ローディング ── */
        .loading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 40px 20px;
            color: var(--p-text-m);
            font-size: 13px;
            justify-content: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--p-spin);
            border-top-color: var(--p-accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        /* ── スクロールバー ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--p-scroll); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--p-scroll2); }
    </style>
</head>
<body>

<!-- ヘッダー -->
<header>
    <a href="/" class="btn-back">← チャットに戻る</a>
    <h1>🔍 Corpus2Skill — RAG 検索テスト</h1>
    <button class="btn-theme" id="themeToggleBtn" onclick="toggleTheme()" title="ライト/ダークモード切替">🌙</button>
</header>

<!-- 検索バー -->
<div class="search-bar">
    <div class="search-row">
        <input type="text" id="queryInput" class="search-input"
               placeholder="検索クエリを入力してください..."
               onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" id="searchBtn" onclick="doSearch()">🔍 検索</button>
    </div>
    <div class="search-meta">
        <span class="top-k-label">表示件数:</span>
        <select class="top-k-select" id="topKSelect">
            <option value="5">5件</option>
            <option value="10" selected>10件</option>
            <option value="20">20件</option>
        </select>
        <span id="searchInfo"></span>
    </div>
</div>

<!-- メインレイアウト -->
<div class="main">
    <!-- 結果リスト -->
    <div class="results-panel" id="resultsPanel">
        <div class="results-empty">
            <div class="icon">🔍</div>
            <p>クエリを入力して検索してください</p>
        </div>
    </div>

    <!-- 詳細パネル -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-placeholder" id="detailPlaceholder">
            <div class="icon">📄</div>
            <p>左のリストからチャンクを選択してください</p>
        </div>
        <div id="detailContent" style="display:none;"></div>
    </div>
</div>

<script>
    let allChunks = [];
    let selectedIdx = -1;

    // ── テーマ切替 ─────────────────────────────────────────────────────
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'light') document.body.classList.add('light-theme');
        else document.body.classList.remove('light-theme');
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
    }
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(current === 'light' ? 'dark' : 'light');
    }

    // ── 検索実行 ────────────────────────────────────────────────────
    async function doSearch() {
        const query = document.getElementById('queryInput').value.trim();
        if (!query) { document.getElementById('queryInput').focus(); return; }

        const topK  = parseInt(document.getElementById('topKSelect').value);
        const panel = document.getElementById('resultsPanel');
        const btn   = document.getElementById('searchBtn');
        const info  = document.getElementById('searchInfo');

        panel.innerHTML = '<div class="loading-row"><div class="spinner"></div>検索中...</div>';
        btn.disabled = true;
        info.textContent = '';
        allChunks = [];
        selectedIdx = -1;
        showDetailPlaceholder();

        const start = Date.now();
        try {
            const res  = await fetch('/api/rag/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, detail: true, top_k: topK }),
            });
            const data = await res.json();

            if (data.error) {
                panel.innerHTML = `<div class="results-empty"><div class="icon">⚠️</div><p>${esc(data.error)}</p></div>`;
                return;
            }

            allChunks = data.chunks || [];
            const elapsed = ((Date.now() - start) / 1000).toFixed(2);
            info.textContent = `${allChunks.length} 件 / ${elapsed}s`;

            renderResults();
        } catch (e) {
            panel.innerHTML = `<div class="results-empty"><div class="icon">⚠️</div><p>エラー: ${esc(e.message)}</p></div>`;
        } finally {
            btn.disabled = false;
        }
    }

    // ── 結果リスト描画 ───────────────────────────────────────────────
    function renderResults() {
        const panel = document.getElementById('resultsPanel');
        if (allChunks.length === 0) {
            panel.innerHTML = '<div class="results-empty"><div class="icon">😶</div><p>一致するチャンクが見つかりませんでした</p></div>';
            return;
        }

        const maxScore = allChunks[0]?.score || 1;
        panel.innerHTML = allChunks.map((c, i) => {
            const barWidth = Math.round((c.score / maxScore) * 100);
            const preview  = (c.text || '').replace(/\n/g, ' ').substring(0, 100);
            const docShort = c.doc_id.length > 36 ? c.doc_id.substring(0, 33) + '…' : c.doc_id;
            const rawLabel = c.raw_score !== undefined ? ` (raw: ${c.raw_score.toFixed(4)})` : '';
            return `
            <div class="result-item" id="result-${i}" onclick="selectChunk(${i})">
                <div class="result-rank">
                    <span class="result-rank-num">#${i + 1}</span>
                    <span class="result-score">スコア: ${c.score.toFixed(4)}${rawLabel}</span>
                </div>
                <div class="score-bar"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
                <div class="result-doc" title="${esc(c.doc_id)}">${esc(docShort)} #${c.chunk_idx}</div>
                <div class="result-preview">${esc(preview)}…</div>
            </div>`;
        }).join('');
    }

    // ── チャンク選択 ─────────────────────────────────────────────────
    function selectChunk(idx) {
        if (selectedIdx >= 0) {
            document.getElementById(`result-${selectedIdx}`)?.classList.remove('selected');
        }
        selectedIdx = idx;
        document.getElementById(`result-${idx}`)?.classList.add('selected');
        showChunkDetail(allChunks[idx], idx);
    }

    // ── 詳細パネル描画 ────────────────────────────────────────────────
    function showDetailPlaceholder() {
        document.getElementById('detailPlaceholder').style.display = 'flex';
        document.getElementById('detailContent').style.display = 'none';
    }

    function showChunkDetail(chunk, idx) {
        document.getElementById('detailPlaceholder').style.display = 'none';
        const dc = document.getElementById('detailContent');
        dc.style.display = 'block';

        const maxScore  = allChunks[0]?.score || 1;
        const barWidth  = Math.round((chunk.score / maxScore) * 100);
        const charCount = (chunk.text || '').length;
        const rawLine   = chunk.raw_score !== undefined
            ? `<div class="detail-score-label">キーワードブースト前: ${chunk.raw_score.toFixed(4)}</div>` : '';

        dc.innerHTML = `
            <div class="detail-section">
                <div class="detail-section-title">📄 チャンク情報 — ランク #${idx + 1}</div>
                <div class="detail-meta-row">
                    <span class="detail-tag">📁 ${esc(chunk.doc_id)}</span>
                    <span class="detail-tag">チャンク #${chunk.chunk_idx}</span>
                    <span class="detail-tag">${charCount} 文字</span>
                </div>
                <div class="detail-score-large">${chunk.score.toFixed(4)}</div>
                <div class="detail-score-label">ハイブリッドスコア（コサイン類似度 × キーワードブースト）</div>
                ${rawLine}
                <div class="score-bar" style="margin-top:10px;">
                    <div class="score-bar-fill" style="width:${barWidth}%"></div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">📝 チャンクテキスト</div>
                <div class="chunk-text-box">${esc(chunk.text || '（テキストなし）')}</div>
            </div>`;
    }

    // ── ユーティリティ ────────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── 初期化 ────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        if (savedTheme === 'light') document.body.classList.add('light-theme');
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.textContent = savedTheme === 'light' ? '☀️' : '🌙';
        document.getElementById('queryInput').focus();
    });
</script>
</body>
</html>
